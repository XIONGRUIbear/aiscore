<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>评分页面</title>
<style>
body {
  font-family: Arial;
  padding: 10px;
}
h2 {
  background: #333;
  color: #fff;
  padding: 10px;
}
h3 {
  background: #eee;
  padding: 5px;
}
input[type="number"] {
  width: 50px;
  margin: 3px;
}
.member {
  margin-left: 15px;
  border-bottom: 1px solid #ccc;
  padding: 5px;
}
#submitBtn {
  margin: 20px 0;
  padding: 10px 30px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>
<body>
<h2>课堂评分系统</h2>
<div id="info"></div>
<div id="scoreArea"></div>
<br>
<button id="submitBtn" onclick="submit()">提交评分</button>

<script>
// ========== Supabase 配置 ==========
const supabaseUrl = "https://ermnlljsfnszocizfpnd.supabase.co"
const supabaseKey = "sb_publishable_JIujn_rk5TH7uejo2NytAQ_Xpem1ZPX"
const TABLE = "scores"

// ========== 小组成员数据 ==========
const groupData = {
  "1组": ["吴嘉盛","张子璇","曾天翼","朱冠霖","杨兴鉴","何承江","鲍博源"],
  "2组": ["冼忠豪","杜承建","叶承树","殷泽木","田泽锐","吴淑桑","韦宗楚","李巧美"],
  "3组": ["郑婷忆","杨宇卓","戴文灿","吴佳禹姗","杨雨珊","赵佳慧","郑高辉"],
  "4组": ["周圆","李佳欣","王一诺","胡艺桐","包毓慧","刘昕冉","陈小灵"],
  "5组": ["张秋锐","蔡济鸿","钟瑶刚","陈赋斌","温从炜","雷明儒","公保东智","何颖"],
  "6组": ["都家更","张郅朋","郝冉","王雅馨","郑舒怡","欧诗雅","钟圣茜","李睿哲"],
  "7组": ["李爽","高若然","吴燕婷","李玲雅","杨逸佳","侯嘉玟"],
  "8组": ["符凡","魏赫","韩玉兴","宋正义","林玉雄","母仕林","王可欣"],
  "9组": ["黄玉菲","刘婉慧","李诗诗","邓新怡","吴香颖","胡嘉航","唐景怡"]
}

// ========== 从 index.html 获取参数 ==========
const params = new URLSearchParams(window.location.search)
const myGroup = params.get("group")
const voterName = params.get("name")
const voterId = params.get("id")

// ========== 存储评分结果 ==========
let result = {}

// ========== 显示当前用户信息 ==========
function showInfo(){
  document.getElementById("info").innerHTML =
    `<p>👤 <b>${voterName}</b> &nbsp;|&nbsp; 学号：${voterId} &nbsp;|&nbsp; 所在组：${myGroup}</p>`
}

// ========== 渲染评分页面 ==========
function render(){
  let html = ""
  for(let g in groupData){
    if(g === myGroup) continue
    html += `<h3>${g}</h3>`
    html += `
      <b>【小组评分】</b><br>
      数据趣味性：<input type="number" min="1" max="10"
        onchange="setGroupScore('${g}','fun',this.value)"><br>
      成员介绍：<input type="number" min="1" max="10"
        onchange="setGroupScore('${g}','intro',this.value)"><br><br>
    `
    html += `<b>【成员评分】</b><br>`
    groupData[g].forEach(name => {
      html += `
        <div class="member">
          <b>${name}</b><br>
          呈现度（美观性）：
          <input type="number" min="1" max="10"
            onchange="setMember('${g}','${name}','beauty',this.value)">
          问题清晰度：
          <input type="number" min="1" max="10"
            onchange="setMember('${g}','${name}','clear',this.value)">
          数据逻辑：
          <input type="number" min="1" max="10"
            onchange="setMember('${g}','${name}','logic',this.value)">
          展示效果：
          <input type="number" min="1" max="10"
            onchange="setMember('${g}','${name}','show',this.value)">
        </div>
      `
    })
    html += "<hr>"
  }
  document.getElementById("scoreArea").innerHTML = html
}

// ========== 记录小组评分 ==========
function setGroupScore(group, type, value){
  if(!result[group]) result[group] = {group:{}, members:{}}
  result[group].group[type] = Number(value)
}

// ========== 记录成员评分 ==========
function setMember(group, name, type, value){
  if(!result[group]) result[group] = {group:{}, members:{}}
  if(!result[group].members[name]) result[group].members[name] = {}
  result[group].members[name][type] = Number(value)
}

// ========== 提交到 Supabase ==========
async function submit(){
  if(!voterName || !voterId){
    alert("姓名或学号缺失，请返回重新填写！")
    return
  }

  if(Object.keys(result).length === 0){
    alert("还没有任何评分，请先打分再提交！")
    return
  }

  const btn = document.getElementById("submitBtn")
  btn.disabled = true
  btn.textContent = "提交中..."

  try {
    const res = await fetch(`${supabaseUrl}/rest/v1/${TABLE}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": supabaseKey,
        "Authorization": "Bearer " + supabaseKey,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        "名字": voterName,
        "学号": voterId,
        "组号": myGroup,
        "所有评分": result
      })
    })

    if(res.ok){
      alert("✅ 提交成功！感谢你的评分。")
      btn.textContent = "已提交 ✅"
    } else {
      const err = await res.json()
      console.error("Supabase 错误：", err)
      alert("❌ 提交失败：" + (err.message || res.status))
      btn.disabled = false
      btn.textContent = "提交评分"
    }
  } catch(e){
    console.error(e)
    alert("❌ 网络错误，请检查网络后重试。")
    btn.disabled = false
    btn.textContent = "提交评分"
  }
}

// ========== 页面加载 ==========
window.onload = function(){
  showInfo()
  render()
}
</script>
</body>
</html>
