<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>评分</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="data.js"></script>

<style>
body { font-family: Arial; }
input { width: 50px; margin: 3px; }
h3 { background: #eee; padding: 5px; }
</style>
</head>

<body>

<h2>评分页面</h2>

<div id="debug" style="color:red;"></div>
<div id="scoreArea"></div>

<button onclick="submit()">提交</button>

<script>
const supabaseUrl = "填你的URL"
const supabaseKey = "填你的KEY"
const client = supabase.createClient(supabaseUrl, supabaseKey)

// 👉 调试输出
const debug = document.getElementById("debug")

// 👉 获取参数
const params = new URLSearchParams(window.location.search)
const myGroup = params.get("group")
const name = params.get("name")
const studentId = params.get("id")

debug.innerHTML += "group=" + myGroup + "<br>"

// 👉 检查 data.js
if(typeof groupData === "undefined"){
  debug.innerHTML += "❌ data.js 没加载<br>"
}else{
  debug.innerHTML += "✅ data.js 已加载<br>"
}

// 👉 渲染
function render(){
  if(!groupData){
    debug.innerHTML += "❌ groupData不存在<br>"
    return
  }

  let html = ""

  const groups = Object.keys(groupData)

  groups.forEach(g=>{
    if(g === myGroup) return

    html += `<h3>${g}</h3>`

    html += `
      数据趣味性：<input onchange="setScore('${g}','fun',this.value)"><br>
      展示效果：<input onchange="setScore('${g}','show',this.value)"><br>
    `

    groupData[g].forEach(m=>{
      html += `${m}：<input onchange="setMember('${g}','${m}',this.value)"><br>`
    })

    html += "<hr>"
  })

  document.getElementById("scoreArea").innerHTML = html
}

let result = {}

function setScore(g, type, val){
  if(!result[g]) result[g] = {group:{}, members:{}}
  result[g].group[type] = Number(val)
}

function setMember(g, name, val){
  if(!result[g]) result[g] = {group:{}, members:{}}
  result[g].members[name] = Number(val)
}

async function submit(){
  alert("测试提交成功（说明页面正常）")
}

// 👉 执行
render()
</script>

</body>
</html>
