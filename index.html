<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>评分入口</title>
</head>

<body>
<h2>课堂评分系统</h2>

<p>姓名：<input id="name"></p>
<p>学号：<input id="studentId"></p>

<p>小组：
<select id="group">
  <option>1组</option><option>2组</option><option>3组</option>
  <option>4组</option><option>5组</option><option>6组</option>
  <option>7组</option><option>8组</option><option>9组</option>
</select>
</p>

<button onclick="next()">开始评分</button>

<script>
function next(){
  const name = document.getElementById("name").value
  const id = document.getElementById("studentId").value
  const group = document.getElementById("group").value

  location.href = `score.html?name=${name}&id=${id}&group=${group}`
}
</script>

</body>
</html>
